<body class="bg-background min-h-screen flex items-center justify-center p-4 md:p-gutter font-body-md text-on-background antialiased selection:bg-primary-container selection:text-white">
<!-- Linear/Transactional Screen: No Navigations Rendered -->
<main class="w-full max-w-[420px]">
<!-- Centered White Card -->
<div class="bg-surface-container-lowest rounded-xl shadow-ambient p-8 md:p-10 flex flex-col relative overflow-hidden">
<!-- Subtle top border accent to hint at premium brand -->
<div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-secondary-container via-primary-container to-tertiary-container opacity-80"></div>
<!-- Logo Area -->
<div class="flex justify-center mb-10">
<img alt="Colour Your Drape Logo" class="h-[48px] w-auto object-contain rounded-full shadow-sm ring-1 ring-outline-variant/30" src="https://lh3.googleusercontent.com/aida/AP1WRLsrEbXdQGbVUiJFS_OxXPeni_DzUkTRmONlbfY8xEjE77DCjepJz0qea9iwpRXUchUj29f9tJG31TDNk5LdH30n912norPPjSmeRpaCdYE8pF5N3Wkr5joGv_SG7G5gn8fynHPcldkDAlZNSbrNwgOoF_bJ07J_hs70X-wnuAUhFlb68UpxonVDxDWDnTZUN0vM28fkN4FIF1EgiTaRfPooFNQFbjn-dQNsC3x_CrvTrcShxfS7TG3unjo">
</div>
<!-- Welcome Text -->
<div class="text-center mb-8">
<h1 class="font-headline-md text-headline-md text-on-background mb-2">Welcome Back</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Sign in to access your artisanal collection.</p>
</div>
<!-- Form -->
<form action="#" class="flex flex-col gap-5" method="POST">
<!-- Email Field -->
<div>
<label class="block font-label-md text-label-md text-on-background mb-2" for="email">Email Address</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 flex items-center pl-3 text-outline">
<span class="material-symbols-outlined text-[20px]">mail</span>
</span>
<input class="w-full pl-10 pr-4 py-3 bg-surface border border-outline-variant rounded-lg font-body-md text-body-md text-on-background placeholder:text-outline-variant focus:outline-none focus:border-secondary-container focus:ring-1 focus:ring-secondary-container transition-colors duration-200" id="email" name="email" placeholder="Enter your email" required="" type="email">
</div>
</div>
<!-- Password Field -->
<div>
<div class="flex justify-between items-center mb-2">
<label class="block font-label-md text-label-md text-on-background" for="password">Password</label>
<!-- Forgot Password Link -->
<a class="font-label-md text-label-md text-secondary hover:text-secondary-fixed-dim hover:underline transition-colors duration-200" href="#">Forgot password?</a>
</div>
<div class="relative">
<span class="absolute inset-y-0 left-0 flex items-center pl-3 text-outline">
<span class="material-symbols-outlined text-[20px]">lock</span>
</span>
<input class="w-full pl-10 pr-10 py-3 bg-surface border border-outline-variant rounded-lg font-body-md text-body-md text-on-background placeholder:text-outline-variant focus:outline-none focus:border-secondary-container focus:ring-1 focus:ring-secondary-container transition-colors duration-200" id="password" name="password" placeholder="Enter your password" required="" type="password">
<button aria-label="Toggle password visibility" class="absolute inset-y-0 right-0 flex items-center pr-3 text-outline hover:text-on-background transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility_off</span>
</button>
</div>
</div>
<!-- Actions -->
<div class="pt-4">
<button class="w-full py-3.5 px-4 bg-primary-container text-white font-label-md text-label-md rounded-lg shadow-sm hover:shadow-md hover:opacity-90 hover:-translate-y-0.5 transition-all duration-200 flex justify-center items-center gap-2" type="submit">
<span>Sign In</span>
<span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</div>
<div class="text-center mt-4">
<p class="font-body-md text-body-md text-on-surface-variant">Don't have an account? <a class="text-primary hover:underline font-label-md" href="#">Create one</a></p>
</div>
</form>
</div>

<div class="mt-8 text-center flex items-center justify-center gap-2 opacity-60">
<span class="material-symbols-outlined text-[16px] text-on-surface-variant">verified_user</span>
<span class="font-label-md text-label-md text-on-surface-variant text-xs">Secure Artisan Portal</span>
</div>
